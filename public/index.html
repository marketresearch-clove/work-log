<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clovetech Work Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="icon" type="image/png" href="https://clovetech.com/wp-content/uploads/2025/04/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon" style="width:100px;height:40px">
        <img src="https://cloveid.netlify.app/assets/CLOVE%20LOGO%20BLACK-CfaGgA5m.png" alt="Clovetech" />
      </div>
      <span class="brand-sub">Work Logger</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-page="worklog">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>
        Work Log
      </a>
      <a class="nav-item" data-page="attendance">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
        Attendance &amp; Sessions
      </a>
      <a class="nav-item" data-page="projects">
        <svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Projects
      </a>
      <a class="nav-item" data-page="leaves">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Leaves
      </a>
      <a class="nav-item" data-page="issues">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Issues
      </a>
      <a class="nav-item" data-page="team">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Team
      </a>
      <a class="nav-item" id="settingsNavItem" data-page="settings" style="display:none">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="footer-info">
        <span class="footer-dot" id="statusDot"></span>
        <span id="footer-month">June 2026</span>
      </div>
      <a class="sheet-link" id="sheetLink" href="#" target="_blank" title="Open Google Sheet" style="display:none">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Open Sheet
      </a>
      <button class="sheet-link" onclick="showSetup()" title="Configure Google Sheet" id="setupBtn" style="display:none">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        Setup Sheet
      </button>
    </div>
  </aside>

  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main content -->
  <main class="main" id="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" id="menuBtn">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <div class="user-chip" id="userChip">
          <span class="user-avatar" id="userAvatar">A</span>
          <span id="userNameChip">Admin</span>
          <button class="user-logout" onclick="logout()" title="Sign out">&#x23FB;</button>
        </div>
        <div class="date-badge" id="dateBadge"></div>
        <button class="btn btn-primary" id="primaryActionBtn" style="display:none">+ Add Entry</button>
      </div>
    </header>

    <!-- Page containers -->
    <div id="page-dashboard" class="page active"></div>
    <div id="page-worklog" class="page"></div>
    <div id="page-attendance" class="page"></div>
    <div id="page-projects" class="page"></div>
    <div id="page-leaves" class="page"></div>
    <div id="page-issues" class="page"></div>
    <div id="page-team" class="page"></div>
    <div id="page-settings" class="page"></div>
  </main>

  <!-- Global Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Modal</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Analog Clock Picker -->
  <div class="clock-overlay" id="clockOverlay" onclick="clockOverlayClick(event)">
    <div class="clock-panel" id="clockPanel">
      <div class="clock-display">
        <span class="clock-hh" id="cpHH" contenteditable="plaintext-only"
          onclick="cpClickHH()" onkeydown="cpKeydown(event,'hour')"
          oninput="cpInput(event,'hour')" onblur="cpBlur(event,'hour')">--</span>
        <span class="clock-sep">:</span>
        <span class="clock-mm" id="cpMM" contenteditable="plaintext-only"
          onclick="cpClickMM()" onkeydown="cpKeydown(event,'minute')"
          oninput="cpInput(event,'minute')" onblur="cpBlur(event,'minute')">--</span>
        <div class="clock-ampm">
          <button id="cpAM" onclick="setAmPm('AM')">AM</button>
          <button id="cpPM" onclick="setAmPm('PM')">PM</button>
        </div>
      </div>
      <div class="clock-hint" id="clockHint">Select hour</div>
      <div class="clock-face-wrap">
        <svg class="clock-svg" id="clockSvg" viewBox="0 0 280 280"
          onmousemove="clockHover(event)"
          onclick="clockClick(event)"
          onmouseleave="clockMouseLeave()">
          <!-- background -->
          <circle cx="140" cy="140" r="136" fill="#1a1a2e" stroke="#2d2d4a" stroke-width="2"/>
          <!-- tick marks -->
          <g id="clockTicks"></g>
          <!-- hand -->
          <line id="clockHand" x1="140" y1="140" x2="140" y2="55"
            stroke="#6c63ff" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
          <!-- center dot -->
          <circle cx="140" cy="140" r="5" fill="#6c63ff"/>
          <!-- number labels -->
          <g id="clockNumbers" font-family="Inter,sans-serif" font-size="16" text-anchor="middle" dominant-baseline="central"></g>
          <!-- hover indicator -->
          <circle id="clockHoverDot" cx="140" cy="55" r="18" fill="rgba(108,99,255,0.2)" stroke="#6c63ff" stroke-width="1.5" opacity="0"/>
        </svg>
      </div>
      <div class="clock-footer">
        <button class="btn btn-secondary btn-sm" onclick="closeClock()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="confirmClock()">OK</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Login Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <div class="login-brand">
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:100%">
          <div class="brand-icon" style="width:80px;height:80px">
            <img src="https://cloveid.netlify.app/assets/CLOVE%20LOGO%20BLACK-CfaGgA5m.png" alt="Clovetech" />
          </div>
          <div class="brand-sub" style="font-size:13px;letter-spacing:.06em;text-transform:uppercase">Work Logger</div>
        </div>
      </div>
      <div class="login-tabs">
        <button class="login-tab-btn active" data-type="admin" onclick="switchLoginTab('admin',this)">Admin</button>
        <button class="login-tab-btn" data-type="member" onclick="switchLoginTab('member',this)">Member</button>
      </div>
      <div id="loginAdminForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUser" placeholder="admin" autocomplete="username" />
        </div>
        <div class="form-group" style="margin-top:12px">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="loginPass" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password"
              onkeydown="if(event.key==='Enter') submitLogin()" />
            <button type="button" class="pw-eye" onclick="togglePwVis('loginPass',this)" tabindex="-1" aria-label="Show password">
              <svg class="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off-icon" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div id="loginMemberForm" style="display:none">
        <div class="form-group">
          <label>Your Name</label>
          <select id="loginMemberName">
            <option value="">Loading&hellip;</option>
          </select>
        </div>
        <div class="form-group" style="margin-top:12px">
          <label>PIN (4 digits)</label>
          <div class="pw-wrap">
            <input type="password" id="loginPin" maxlength="4" placeholder="&bull;&bull;&bull;&bull;"
              style="font-size:20px;letter-spacing:6px;text-align:center"
              onkeydown="if(event.key==='Enter') submitLogin()" />
            <button type="button" class="pw-eye" onclick="togglePwVis('loginPin',this)" tabindex="-1" aria-label="Show PIN">
              <svg class="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off-icon" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div id="loginError" style="color:var(--red,#e74c3c);font-size:13px;margin-top:8px;display:none"></div>
      <button class="btn btn-primary" id="loginSubmitBtn" style="width:100%;margin-top:16px" onclick="submitLogin()">Sign In</button>
    </div>
  </div>

  <script src="modules/auth.js"></script>
  <script src="modules/constants.js"></script>
  <script src="modules/state.js"></script>
  <script src="modules/api.js"></script>
  <script src="modules/helpers.js"></script>
  <script src="modules/ui.js"></script>
  <script src="modules/pagination.js"></script>
  <script src="modules/dashboard.js"></script>
  <script src="modules/worklog.js"></script>
  <script src="modules/sessions.js"></script>
  <script src="modules/attendance.js"></script>
  <script src="modules/projects.js"></script>
  <script src="modules/leaves.js"></script>
  <script src="modules/issues.js"></script>
  <script src="modules/team.js"></script>
  <script src="modules/settings.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="modules/hot-reload.js"></script>
  <script src="app.js"></script>
</body>
</html>
